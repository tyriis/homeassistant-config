---
# Office light automation:
# - Motion detected (group.motion_office) turns on appropriate scene based on time:
#   - 00:00-06:00: scene.office_night (brightness 45)
#   - 06:00-08:00: scene.office_working (brightness 235)
#   - 08:00-00:00: scene.office_heartwarming (brightness 255)
# - No motion timeout behavior:
#   - 00:00-08:00: Turn off after 10 minutes
#   - 08:00-00:00: Switch to scene.office_relax after 15 minutes, turn off after 20 minutes
# - Automation can be blocked via binary_sensor.office_light_automation_block_status

alias: office_light
id: office_light
description: Turn on the office light when motion is detected
mode: single
triggers:
  - trigger: state
    entity_id:
      - group.motion_office
    to: "on"
  - trigger: state
    entity_id:
      - group.motion_office
    to: "off"
    for:
      minutes: 10
  - trigger: state
    entity_id:
      - group.motion_office
    to: "off"
    for:
      minutes: 15
  - trigger: state
    entity_id:
      - group.motion_office
    to: "off"
    for:
      minutes: 20
  - trigger: time
    at: "06:00:01"
  - trigger: time
    at: "08:00:01"
  - trigger: time
    at: "00:00:01"
conditions: []
actions:
  - choose:
      - conditions:
          - condition: time
            after: "00:00:00"
            before: "06:00:00"
          - condition: template
            value_template: >-
              {{
                states('binary_sensor.office_light_automation_block_status') == 'off'
                and states('group.motion_office') == 'on'
                and (
                  states('light.office') == 'off'
                  or state_attr('light.office', 'brightness') != 45
                )
              }}
            # scene.office_night brightness value = 45
        sequence:
          - action: scene.turn_on
            data: {}
            target:
              entity_id: scene.office_night
          - action: system_log.write
            data:
              level: info
              message: scene.office_night turned on
              logger: homeassistant.components.automation.office_light
      - conditions:
          - condition: time
            after: "06:00:00"
            before: "08:00:00"
          - condition: template
            value_template: >-
              {{
                states('binary_sensor.office_light_automation_block_status') == 'off'
                and states('group.motion_office') == 'on'
                and (
                  states('light.office') == 'off'
                  or state_attr('light.office', 'brightness') != 235
                )
              }}
            # scene.office_working brightness value = 235
        sequence:
          - action: scene.turn_on
            data: {}
            target:
              entity_id: scene.office_working
          - action: system_log.write
            data:
              level: info
              message: scene.office_working turned on
              logger: homeassistant.components.automation.office_light
      - conditions:
          - condition: or
            conditions:
              - condition: time
                after: "08:00:00"
                before: "00:00:00"
          - condition: template
            value_template: >-
              {{
                states('binary_sensor.office_light_automation_block_status') == 'off'
                and states('group.motion_office') == 'on'
                and (
                  states('light.office') == 'off'
                  or state_attr('light.office', 'brightness') != 255
                )
              }}
            # scene.office_heartwarming brightness value = 255
        sequence:
          - action: scene.turn_on
            data: {}
            target:
              entity_id: scene.office_heartwarming
          - action: system_log.write
            data:
              level: info
              message: scene.office_heartwarming turned on
              logger: homeassistant.components.automation.office_light
      - conditions:
          - condition: state
            entity_id: group.motion_office
            state: "off"
            for:
              minutes: 10
          - condition: time
            after: "00:00:00"
            before: "08:00:00"
          - condition: state
            entity_id: light.office
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.office
          - action: system_log.write
            data:
              level: info
              message: light.office turned off
              logger: homeassistant.components.automation.office_light
      - conditions:
          - condition: state
            entity_id: group.motion_office
            state: "off"
            for:
              minutes: 15
          - condition: time
            after: "08:00:00"
            before: "00:00:00"
          - condition: state
            entity_id: light.office
            state: "on"
        sequence:
          - action: scene.turn_on
            data: {}
            target:
              entity_id: scene.office_relax
          - action: system_log.write
            data:
              level: info
              message: scene.office_relax turned on
              logger: homeassistant.components.automation.office_light
      - conditions:
          - condition: state
            entity_id: group.motion_office
            state: "off"
            for:
              minutes: 20
          - condition: time
            after: "08:00:00"
            before: "00:00:00"
          - condition: state
            entity_id: light.office
            state: "on"
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.office
          - action: system_log.write
            data:
              level: info
              message: light.office turned off
              logger: homeassistant.components.automation.office_light
