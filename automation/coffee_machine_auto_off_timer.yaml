---
alias: Coffee Machine Auto Off Timer
id: coffee_machine_auto_off_timer
description: Start/cancel countdown for coffee machine auto-off and expose remaining time to dashboard
mode: restart
trigger:
  - platform: state
    entity_id: switch.nous_a1z_coffee_machine
    id: relay_state_changed

  - platform: homeassistant
    event: start
    id: ha_start

  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.coffee_machine_auto_off
    id: timer_finished

action:
  - choose:
      - conditions:
          - condition: trigger
            id: timer_finished
          - condition: state
            entity_id: switch.nous_a1z_coffee_machine
            state: "on"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: switch.nous_a1z_coffee_machine

      - conditions:
          - condition: state
            entity_id: switch.nous_a1z_coffee_machine
            state: "on"
        sequence:
          - service: timer.start
            target:
              entity_id: timer.coffee_machine_auto_off

      - conditions:
          - condition: state
            entity_id: switch.nous_a1z_coffee_machine
            state: "off"
        sequence:
          - service: timer.cancel
            target:
              entity_id: timer.coffee_machine_auto_off
