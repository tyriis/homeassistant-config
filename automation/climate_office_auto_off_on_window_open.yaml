---
alias: Climate Office Auto Off on Window Open
id: climate_office_auto_off_on_window_open
description: >
  Automatically turns off the office AC when the window is open for more than 5 minutes.
  The automation checks every 5 minutes and respects the state of the climate and window sensors.
mode: single
trigger:
  # Check every minute for cleanup opportunities
  - platform: time_pattern
    minutes: "/5"
  # window open for more then 5 minutes
  - platform: state
    entity_id: binary_sensor.aqara_contact_window_office_contact
    to: "on"
    for:
      minutes: 5

condition:
  # Only act if the climate is currently on, window is open, and the window has been open for more than 5 minutes
  - condition: template
    value_template: >
      {% set last_changed = states.binary_sensor.aqara_contact_window_office_contact.last_changed %}
      {{
        states('climate.office_mqtt_hvac') == 'cool'
        and states('binary_sensor.aqara_contact_window_office_contact') == 'on'
        and last_changed is not none
        and (as_timestamp(now()) - as_timestamp(last_changed)) > 300
      }}
action:
  - choose:
      # Case 1: the window is open for more than 5 minutes
      - conditions:
          - condition: state
            entity_id: binary_sensor.aqara_contact_window_office_contact
            state: "on"
          - condition: template
            value_template: >
              {% set last_changed = states.binary_sensor.aqara_contact_window_office_contact.last_changed %}
              {{
                last_changed is not none
                  and (as_timestamp(now()) - as_timestamp(last_changed)) > 300
              }}
        sequence:
          # Release existing lock if it exists
          - service: rest_command.release_lock
            data:
              name: hisense_ac_office

          - service: climate.turn_off
            target:
              entity_id: climate.office_mqtt_hvac

          - service: system_log.write
            data:
              level: info
              message: "Office AC turned off due to open window for more than 5 minutes"
              logger: homeassistant.components.automation.climate_office_auto_off
