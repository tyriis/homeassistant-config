---
alias: Climate Office Auto Off on Target Temp
id: climate_office_auto_off_on_target_temp
description: >
  Automatically turns off the office AC when the temperature drops below 22°C
  and the minimum run time has been met.
mode: single
trigger:
  # Check every minute for cleanup opportunities
  - platform: time_pattern
    minutes: "/5"
  # Trigger when the temperature drops below 22°C
  - platform: numeric_state
    entity_id: sensor.qingping_office_temperature
    below: 22
    for:
      minutes: 5

condition:
  # Only act if the climate is currently on, and the temperature is bellow 22°C for more than 5 minutes, and the ac has been running for at least 30 minutes
  - condition: template
    value_template: >
      {% set ac_start_timestamp = as_timestamp(states.input_datetime.climate_office_start_time.state) %}
      {% set current_timestamp = now().timestamp() %}
      {% set ac_run_time = (current_timestamp - ac_start_timestamp) / 60 %}
      {{
        states('climate.office_mqtt_hvac') == 'cool'
        and states('sensor.qingping_office_temperature') | float <= 22
        and ac_run_time > 30
      }}

actions:
  # Release existing lock if it exists
  - action: rest_command.release_lock
    data:
      name: hisense_ac_office
  # create new lock for 20 minutes
  - action: rest_command.create_lock
    data:
      name: hisense_ac_office
      owner: homeassistant-automation
      duration: 20m
  # Turn off the AC
  - action: climate.turn_off
    target:
      entity_id: climate.office_mqtt_hvac
  # Log the action
  - action: system_log.write
    data:
      level: info
      message: Office AC turned off due to target temp reached.
      logger: >-
        homeassistant.components.automation.climate_office_auto_off_on_target_temp
