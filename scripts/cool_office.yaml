---
cool_office:
  alias: Cool Office
  mode: single
  sequence:
    # Release existing lock if it exists
    - service: rest_command.release_lock
      data:
        name: hisense_ac_office
    # Create 20-minute lock for automation
    - service: rest_command.create_lock
      data:
        name: hisense_ac_office
        owner: homeassistant-automation
        duration: 20m
    # check if not mode cooling if so set it to cooling
    - if:
        condition: template
        value_template: >
          {{
            states('climate.office_mqtt_hvac') != 'cool'
          }}
      then:
        # set the AC to cooling mode
        - service: climate.set_hvac_mode
          target:
            entity_id: climate.office_mqtt_hvac
          data:
            hvac_mode: cool
        # log the action
        - service: system_log.write
          data:
            level: info
            message: "Set Office AC mode: cooling."
            logger: homeassistant.components.script.cool_office
    - if:
        # ac is off turn on
        condition: template
        value_template: >
          {{
            states('climate.office_mqtt_hvac') == 'off'
          }}
      then:
        # turn on the AC
        - service: climate.turn_on
          target:
            entity_id: climate.office_mqtt_hvac
        # log the action
        - service: system_log.write
          data:
            level: info
            message: "Started Office AC: {{ reason | default('Manual') }}."
            logger: homeassistant.components.script.cool_office
