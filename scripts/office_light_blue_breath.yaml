---
office_light_blue_breath:
  alias: Office Light Blue Breath
  mode: single
  sequence:
    - condition: state
      entity_id: light.office
      state: "on"

    - variables:
        original_brightness: "{{ state_attr('light.office', 'brightness') }}"
        original_color_temp: "{{ state_attr('light.office', 'color_temp_kelvin') or 3200 }}"

    - action: light.turn_on
      target:
        entity_id: light.office
      data:
        rgb_color: [0, 0, 255]
        transition: 2

    - delay:
        seconds: 3

    - action: light.turn_on
      target:
        entity_id: light.office
      data:
        brightness: "{{ original_brightness | int }}"
        color_temp_kelvin: "{{ original_color_temp | int }}"
        transition: 2

    - delay:
        seconds: 3

    - action: light.turn_on
      target:
        entity_id: light.office
      data:
        rgb_color: [0, 0, 255]
        transition: 2

    - delay:
        seconds: 3

    - action: light.turn_on
      target:
        entity_id: light.office
      data:
        brightness: "{{ original_brightness | int }}"
        color_temp_kelvin: "{{ original_color_temp | int }}"
        transition: 2
