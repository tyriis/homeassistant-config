---
sensor:
  - default_entity_id: sensor.coffee_machine_auto_off_remaining_minutes
    unique_id: coffee_machine_auto_off_remaining_minutes
    name: Coffee Machine Auto Off Remaining Minutes
    unit_of_measurement: min
    icon: mdi:coffee-outline
    state: >
      {% set remaining = state_attr('timer.coffee_machine_auto_off', 'remaining') %}
      {% if remaining in [none, 'unknown', 'unavailable'] %}
        0
      {% else %}
        {{ ((as_timedelta(remaining).total_seconds() / 60) | round(0, 'ceil')) | int(0) }}
      {% endif %}

  - default_entity_id: sensor.coffee_machine_auto_off_progress_percent
    unique_id: coffee_machine_auto_off_progress_percent
    name: Coffee Machine Auto Off Progress
    unit_of_measurement: "%"
    icon: mdi:timer-sand
    state: >
      {% set duration = state_attr('timer.coffee_machine_auto_off', 'duration') %}
      {% set remaining = state_attr('timer.coffee_machine_auto_off', 'remaining') %}
      {% if duration in [none, 'unknown', 'unavailable'] or remaining in [none, 'unknown', 'unavailable'] %}
        0
      {% else %}
        {% set total = as_timedelta(duration).total_seconds() %}
        {% set left = as_timedelta(remaining).total_seconds() %}
        {% if total <= 0 %}
          0
        {% else %}
          {{ ((left / total) * 100) | round(0) | int(0) }}
        {% endif %}
      {% endif %}
